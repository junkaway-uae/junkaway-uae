<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:linear-gradient(to bottom,#f0fdf4,#ecfeff);color:#0f172a;}

header{
display:flex;justify-content:space-between;align-items:center;
padding:10px 20px;background:white;

.logo{display:flex;align-items:center;gap:10px;}

.hero{

linear-gradient(rgba(15,23,42,0.6),rgba(34,197,94,0.5)),
url('https://images.unsplash.com/photo-1581579185169-3f9c5f6a1f7b') center/cover no-repeat;
}

.hero h1{font-size:42px;font-weight:800;}
.hero p{margin-top:10px;font-size:18px;}

.btn{
margin-top:20px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;padding:14px 28px;border-radius:12px;
text-decoration:none;font-weight:bold;
}

.trust{
display:flex;justify-content:center;gap:20px;
flex-wrap:wrap;padding:15px;background:#dcfce7;font-weight:bold;
}

section{padding:60px 20px;max-width:1100px;margin:auto;}
h2{text-align:center;margin-bottom:25px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:15px;
}

.card{
background:white;border-radius:14px;overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card img{width:100%;height:170px;object-fit:cover;}
.card p{padding:12px;text-align:center;font-weight:bold;}

form{
background:white;padding:20px;border-radius:14px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

input,textarea{
width:100%;padding:12px;margin:10px 0;
border:1px solid #ddd;border-radius:10px;
}

footer{
text-align:center;padding:20px;
background:#0f172a;color:white;
}

.float{
position:fixed;bottom:20px;right:20px;
display:flex;flex-direction:column;gap:10px;
}

.float a{
width:52px;height:52px;display:flex;
align-items:center;justify-content:center;
border-radius:50%;color:white;font-size:20px;text-decoration:none;
}

.call{background:#2563eb;}
.wa{background:#16a34a;}

</style>

<script>
function sendWA(){

let url="https://wa.me/971529267678?text="
+"JunkAway UAE Request%0A"
+"Name: "+n+"%0A"
+"Phone: "+p+"%0A"
+"Request: "+m;

window.open(url,"_blank");
return false;
}
</script>
